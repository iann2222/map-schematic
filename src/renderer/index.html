<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>地圖示意圖</title>
    <style>
      :root {
        --bg: #0b0f19;
        --panel: #111827;
        --panel-strong: #1e293b;
        --ink: #f1f5f9;
        --muted: #94a3b8;
        --accent: #1976d2;
        --danger: #ef4444;
        --border: rgba(255, 255, 255, 0.08);
        --border-soft: rgba(255, 255, 255, 0.05);
        --field-bg: #0f172a;
        --picked-color-w: 32px;
        --picked-color-h: 22px;
      }
      body {
        font-family: "Inter", "Roboto", system-ui, sans-serif;
        margin: 0;
        padding: 16px;
        color: var(--ink);
        background: var(--bg);
      }
      .layout {
        display: grid;
        gap: 16px;
        grid-template-columns: 320px 1fr;
        min-height: calc(100vh - 32px);
      }
      .layout.step-3 {
        grid-template-columns: 300px minmax(0, 1fr) 320px;
      }
      .panel {
        background: var(--panel);
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 16px 30px rgba(3, 7, 18, 0.35);
        display: flex;
        flex-direction: column;
        gap: 16px;
        position: relative;
        z-index: 2;
        border: 1px solid var(--border-soft);
      }
      .panel.compact {
        gap: 10px;
      }
      .panel.card {
        padding: 10px;
        border-radius: 12px;
        background: var(--panel-strong);
        border: 1px solid var(--border);
        box-shadow: none;
      }
      .panel.card.compact {
        padding: 8px;
      }
      .step-header {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(15, 23, 42, 0.55);
      }
      .step-progress {
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.4px;
      }
      .step-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--ink);
      }
      .step-subtitle {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.5;
      }
      .step-panel {
        display: none;
        flex-direction: column;
        gap: 10px;
      }
      .step-panel.active {
        display: flex;
      }
      .hint {
        font-size: 12px;
        color: var(--muted);
      }
      .section-title {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        padding: 0;
        border: none;
        background: transparent;
      }
      .section-title.card-title {
        margin-bottom: 6px;
      }
      .option-row {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      .option-row.color-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }
      .color-head {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
      }
      .color-head input[type="color"] {
        margin-left: 0;
      }
      .option-row.color-row .ratio-label {
        width: 72px;
        flex: 0 0 72px;
      }
      .option-row + .option-row {
        margin-top: 2px;
      }
      .option-row .secondary.active {
        border: 1px solid rgba(56, 189, 248, 0.9);
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.35);
      }
      .ratio-button {
        min-width: 58px;
        height: 34px;
        padding: 6px 8px;
        font-size: 14px;
        flex: 0 0 auto;
      }
      .option-row.option-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        align-items: center;
      }
      .option-row.option-grid .ratio-button,
      .option-row.option-grid .secondary,
      .option-row.option-grid .ratio-input,
      .option-row.option-grid .hint {
        width: 100%;
      }
      .option-row.option-grid .secondary,
      .option-row.option-grid .ratio-button {
        justify-self: stretch;
        text-align: center;
      }
      .option-row.option-grid .hint {
        text-align: center;
      }
      .ratio-label {
        padding: 0;
        border: none;
        background: transparent;
        color: #94a3b8;
        font-weight: 500;
        font-size: 14px;
        width: 72px;
        flex: 0 0 72px;
      }
      .ratio-input {
        width: 36px;
        padding: 6px 6px;
        text-align: center;
        font-size: 14px;
        background: #0b1020;
        color: var(--ink);
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 10px;
      }
      .ratio-input::-webkit-outer-spin-button,
      .ratio-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .ratio-input {
        appearance: textfield;
        -moz-appearance: textfield;
      }
      .slider {
        --slider-track: rgba(148, 163, 184, 0.35);
        --slider-fill: var(--accent);
        --slider-dot: rgba(56, 189, 248, 0.82);
        position: relative;
        flex: 1;
        min-width: 0;
        height: 28px;
      }
      .slider-track {
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        height: 4px;
        transform: translateY(-50%);
        border-radius: 999px;
        background: var(--slider-track);
      }
      .slider-fill {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 50%;
        border-radius: 999px;
        background: var(--slider-fill);
      }
      .slider-thumb {
        position: absolute;
        top: 50%;
        z-index: 3;
        width: 13px;
        height: 13px;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background: var(--slider-fill);
        border: 2px solid rgba(11, 16, 32, 0.9);
        box-shadow: 0 2px 6px rgba(15, 23, 42, 0.35);
        cursor: grab;
      }
      .slider-thumb:focus-visible {
        outline: 2px solid rgba(56, 189, 248, 0.8);
        outline-offset: 2px;
      }
      .slider.dragging .slider-thumb {
        cursor: grabbing;
      }
      .slider-marks {
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        height: 8px;
        transform: translateY(-50%);
        pointer-events: none;
        z-index: 1;
      }
      .slider-mark {
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%);
      }
      .slider-mark .tick {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--slider-dot);
        box-shadow: 0 0 0 1px rgba(11, 16, 32, 0.45);
      }
      .slider-mark.active .tick {
        background: var(--slider-fill);
      }
      .slider-mark.active {
        opacity: 0;
      }
      #map text[data-marker="label"][data-dragging="true"] {
        outline: 1px dashed rgba(56, 189, 248, 0.9);
        outline-offset: 2px;
      }
      .color-palette {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 8px;
        padding-left: 72px;
      }
      .option-row.color-row .color-palette {
        margin-top: 6px;
        padding-left: 84px;
      }
      .color-picker {
        width: 100%;
      }
      input[type="color"] {
        -webkit-appearance: none;
        appearance: none;
        width: var(--picked-color-w);
        height: var(--picked-color-h);
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 3px;
        background: transparent;
        box-shadow: none;
        box-sizing: border-box;
      }
      input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 0;
        border: none;
        background: transparent;
      }
      input[type="color"]::-webkit-color-swatch {
        border: none;
        border-radius: 2px;
      }
      input[type="color"]::-moz-color-swatch {
        border: none;
        border-radius: 2px;
      }
      .right-panel .section-title {
        font-size: 18px;
        font-weight: 600;
        color: var(--ink);
        letter-spacing: 0.01em;
        text-transform: none;
      }
      .color-pop {
        width: 100%;
        position: relative;
      }
      .color-pop summary {
        list-style: none;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(148, 163, 184, 0.16);
        cursor: pointer;
        user-select: none;
      }
      .color-pop summary::-webkit-details-marker {
        display: none;
      }
      .color-chip {
        width: 18px;
        height: 18px;
        border-radius: 6px;
        border: 1px solid rgba(15, 23, 42, 0.6);
        box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.25);
      }
      .color-popover {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        z-index: 5;
        background: #0b1020;
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 12px;
        padding: 10px;
        min-width: 220px;
        box-shadow: 0 12px 26px rgba(15, 23, 42, 0.45);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .color-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .color-row input[type="color"] {
        width: var(--picked-color-w);
        height: var(--picked-color-h);
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 3px;
        background: transparent;
      }
      .color-row input[type="text"] {
        flex: 1;
      }
      .color-swatch {
        width: 18px;
        height: 18px;
        border-radius: 6px;
        border: 1px solid rgba(15, 23, 42, 0.6);
        box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.25);
        cursor: pointer;
      }
      .marker-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .marker-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        font-size: 14px;
        font-weight: 400;
        color: #f1f5f9;
        margin-bottom: 6px;
      }
      .marker-item:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .marker-item .marker-actions {
        display: flex;
        gap: 6px;
      }
      .marker-item button {
        padding: 4px 6px;
        font-size: 12px;
        background: transparent;
        color: #94a3b8;
        border: none;
        transition: all 0.2s;
      }
      .marker-item button:hover {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
      }
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(3, 7, 18, 0.65);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }
      .modal-backdrop.active {
        display: flex;
      }
      .modal {
        width: 360px;
        background: #0f172a;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .modal .modal-title {
        font-size: 14px;
        font-weight: 700;
      }
      .modal .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }
      .title {
        font-size: 18px;
        font-weight: 600;
        margin: 0;
      }
      .subtitle {
        color: var(--muted);
        margin: 0;
      }
      .status {
        font-size: 12px;
        color: var(--muted);
      }
      .field {
        display: flex;
        gap: 8px;
      }
      .field.search-field {
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .field.search-field input[type="text"] {
        border: none;
        background: transparent;
        box-shadow: none;
        padding: 4px 0;
        height: 28px;
        font-size: 14px;
      }
      .field.search-field input[type="text"]:focus {
        border: none;
        box-shadow: none;
      }
      .search-divider {
        width: 1px;
        height: 18px;
        background: rgba(255, 255, 255, 0.15);
      }
      .icon-btn {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: none;
        background: transparent;
        color: var(--ink);
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        box-shadow: none;
      }
      .icon-btn svg {
        width: 16px;
        height: 16px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
      }
      .icon-clear {
        font-size: 18px;
        line-height: 1;
        display: none;
      }
      .field.inline-actions {
        align-items: center;
      }
      .field.stack {
        flex-direction: column;
        align-items: stretch;
      }
      .field.stack input[type="text"] {
        height: 32px;
        padding: 6px 10px;
      }
      .field.stack button {
        height: 32px;
        padding: 6px 10px;
      }
      .field.row {
        align-items: center;
        flex-wrap: nowrap;
      }
      .field.row input[type="text"] {
        height: 32px;
      }
      .field.row button {
        height: 32px;
        padding: 6px 12px;
        white-space: nowrap;
      }
      .field.row input[type="text"] {
        min-width: 0;
      }
      .step-panel[data-step-panel="0"] .field.search-field {
        padding: 4px 10px;
      }
      .step-panel[data-step-panel="0"] .field {
        flex-wrap: nowrap;
        align-items: center;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      input[type="text"] {
        flex: 1;
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: var(--field-bg);
        color: var(--ink);
        height: 40px;
        font-size: 14px;
        font-weight: 500;
        box-sizing: border-box;
      }
      input[type="text"]:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(25, 118, 210, 0.2);
      }
      select {
        flex: 1;
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: var(--field-bg);
        color: var(--ink);
        height: 40px;
        font-size: 14px;
        font-weight: 500;
        box-sizing: border-box;
      }
      button {
        padding: 8px 12px;
        border-radius: 8px;
        border: none;
        background: var(--accent);
        color: #fff;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease-in-out;
        font-size: 14px;
      }
      button.secondary {
        background: rgba(255, 255, 255, 0.05);
        color: var(--ink);
      }
      button.secondary:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      button:hover {
        filter: brightness(1.05);
      }
      .field.search-field .icon-btn {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        filter: none !important;
      }
      .field.search-field .icon-btn:hover {
        background: transparent !important;
        filter: none !important;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .results {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 50vh;
        overflow: auto;
      }
      .results.compact {
        max-height: 28vh;
      }
      .results.plain li {
        background: transparent;
        border: 1px solid rgba(148, 163, 184, 0.18);
      }
      .results li {
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.03);
        cursor: pointer;
      }
      .results li.result-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .result-content {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .result-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .icon-btn {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(25, 118, 210, 0.25);
        color: var(--ink);
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .results li:hover {
        background: rgba(255, 255, 255, 0.08);
      }
      .results .meta {
        font-size: 11px;
        color: var(--muted);
      }
      .map-wrap {
        background: #0f172a;
        border-radius: 12px;
        padding: 6px;
        border: 1px solid var(--border-soft);
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
      }
      .map-stage {
        position: relative;
        height: calc(100vh - 140px);
        width: 100%;
        overflow: hidden;
      }
      .layout.step-3 .map-stage {
        height: calc(100vh - 220px);
      }
      .map-stage canvas,
      .map-stage svg#map {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        border-radius: 12px;
        overflow: hidden;
      }
      .map-stage canvas {
        background: #0a1020;
        pointer-events: none;
      }
      .map-stage svg#map {
        background: transparent;
        cursor: grab;
      }
      .map-stage svg#map.dragging {
        cursor: grabbing;
      }
      .map-stage svg#map.boxing {
        cursor: crosshair;
      }
      .map-stage svg#map [data-shape] {
        cursor: move;
        pointer-events: all;
      }
      .map-toolbar {
        position: absolute;
        right: 16px;
        top: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 2;
      }
      .map-zoom-indicator {
        position: absolute;
        z-index: 2;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        color: #fff;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.08);
        letter-spacing: 0.4px;
        right: 12px;
        bottom: 12px;
        backdrop-filter: blur(6px);
      }
      .crop-frame {
        position: absolute;
        z-index: 2;
        border: 2px solid rgba(56, 189, 248, 0.9);
        box-shadow: 0 0 0 2000px rgba(15, 23, 42, 0.55);
        pointer-events: none;
      }
      .crop-frame.interactive {
        pointer-events: auto;
        cursor: move;
      }
      .crop-handle {
        position: absolute;
        width: 8px;
        height: 8px;
        background: #38bdf8;
        border: 1px solid rgba(15, 23, 42, 0.8);
        border-radius: 0;
        box-sizing: border-box;
      }
      .crop-handle::before {
        content: "";
        position: absolute;
        inset: -6px;
        background: transparent;
      }
      .crop-handle.nw {
        left: -4px;
        top: -4px;
        cursor: nwse-resize !important;
      }
      .crop-handle.ne {
        right: -4px;
        top: -4px;
        cursor: nesw-resize !important;
      }
      .crop-handle.sw {
        left: -4px;
        bottom: -4px;
        cursor: nesw-resize !important;
      }
      .crop-handle.se {
        right: -4px;
        bottom: -4px;
        cursor: nwse-resize !important;
      }
      .crop-handle.n {
        left: 50%;
        top: -4px;
        transform: translateX(-50%);
        cursor: ns-resize !important;
      }
      .crop-handle.s {
        left: 50%;
        bottom: -4px;
        transform: translateX(-50%);
        cursor: ns-resize !important;
      }
      .crop-handle.w {
        left: -4px;
        top: 50%;
        transform: translateY(-50%);
        cursor: ew-resize !important;
      }
      .crop-handle.e {
        right: -4px;
        top: 50%;
        transform: translateY(-50%);
        cursor: ew-resize !important;
      }
      .crop-frame.fixed .crop-handle.n,
      .crop-frame.fixed .crop-handle.s,
      .crop-frame.fixed .crop-handle.w,
      .crop-frame.fixed .crop-handle.e {
        display: block;
      }
      .map-wrap.step-range .map-toolbar,
      .map-wrap.step-locked .map-toolbar {
        display: none;
      }
      .crop-overlay {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }
      .crop-overlay.hidden {
        display: none;
      }
      .crop-mask {
        position: absolute;
        background: #05070f;
      }
      .map-footer {
        margin-top: 16px;
        display: flex;
        justify-content: flex-end;
        gap: 12px;
      }
      .map-list-panel {
        margin-top: 12px;
        display: none;
        flex-direction: column;
        gap: 10px;
        background: #0f172a;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 0;
      }
      .layout.step-3 .map-list-panel {
        display: flex;
      }
      .map-list-panel summary {
        list-style: none;
      }
      .map-list-panel summary::-webkit-details-marker {
        display: none;
      }
      .map-list-header {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding: 12px 16px;
        cursor: pointer;
        color: #f1f5f9;
        font-size: 14px;
        font-weight: 600;
        gap: 6px;
      }
      .map-list-header .chevron {
