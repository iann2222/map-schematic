<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>地圖示意圖</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --ink: #e5e7eb;
        --muted: #9ca3af;
        --accent: #38bdf8;
      }
      body {
        font-family: "IBM Plex Sans", system-ui, sans-serif;
        margin: 0;
        padding: 16px;
        color: var(--ink);
        background: linear-gradient(
          180deg,
          #0b1020 0%,
          #0f172a 50%,
          #111827 100%
        );
      }
      .layout {
        display: grid;
        gap: 16px;
        grid-template-columns: 320px 1fr;
        min-height: calc(100vh - 32px);
      }
      .panel {
        background: var(--panel);
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.35);
        display: flex;
        flex-direction: column;
        gap: 12px;
        position: relative;
        z-index: 2;
      }
      .step-header {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: rgba(15, 23, 42, 0.7);
      }
      .step-progress {
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.4px;
      }
      .step-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--ink);
      }
      .step-subtitle {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.5;
      }
      .step-panel {
        display: none;
        flex-direction: column;
        gap: 10px;
      }
      .step-panel.active {
        display: flex;
      }
      .hint {
        font-size: 12px;
        color: var(--muted);
      }
      .section-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--ink);
        padding: 6px 10px;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: rgba(148, 163, 184, 0.12);
      }
      .option-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .option-row .secondary.active {
        border: 1px solid rgba(56, 189, 248, 0.9);
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.35);
      }
      .ratio-button {
        min-width: 64px;
        height: 34px;
        padding: 6px 10px;
        font-size: 14px;
      }
      .ratio-label {
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: rgba(148, 163, 184, 0.2);
        color: var(--ink);
        font-weight: 600;
        font-size: 14px;
      }
      .ratio-input {
        width: 36px;
        padding: 6px 6px;
        text-align: center;
        font-size: 14px;
        background: #0b1020;
        color: var(--ink);
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 10px;
      }
      .ratio-input::-webkit-outer-spin-button,
      .ratio-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .ratio-input {
        appearance: textfield;
        -moz-appearance: textfield;
      }
      .slider {
        --slider-track: rgba(148, 163, 184, 0.35);
        --slider-fill: var(--accent);
        --slider-dot: rgba(56, 189, 248, 0.82);
        position: relative;
        flex: 1;
        min-width: 0;
        height: 28px;
      }
      .slider-track {
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        height: 4px;
        transform: translateY(-50%);
        border-radius: 999px;
        background: var(--slider-track);
      }
      .slider-fill {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 50%;
        border-radius: 999px;
        background: var(--slider-fill);
      }
      .slider-thumb {
        position: absolute;
        top: 50%;
        z-index: 3;
        width: 13px;
        height: 13px;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background: var(--slider-fill);
        border: 2px solid rgba(11, 16, 32, 0.9);
        box-shadow: 0 2px 6px rgba(15, 23, 42, 0.35);
        cursor: grab;
      }
      .slider-thumb:focus-visible {
        outline: 2px solid rgba(56, 189, 248, 0.8);
        outline-offset: 2px;
      }
      .slider.dragging .slider-thumb {
        cursor: grabbing;
      }
      .slider-marks {
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        height: 8px;
        transform: translateY(-50%);
        pointer-events: none;
        z-index: 1;
      }
      .slider-mark {
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%);
      }
      .slider-mark .tick {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--slider-dot);
        box-shadow: 0 0 0 1px rgba(11, 16, 32, 0.45);
      }
      .slider-mark.active .tick {
        background: var(--slider-fill);
      }
      .slider-mark.active {
        opacity: 0;
      }
      #map text[data-marker="label"][data-dragging="true"] {
        outline: 1px dashed rgba(56, 189, 248, 0.9);
        outline-offset: 2px;
      }
      .color-palette {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .color-swatch {
        width: 18px;
        height: 18px;
        border-radius: 6px;
        border: 1px solid rgba(15, 23, 42, 0.6);
        box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.25);
        cursor: pointer;
      }
      .marker-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .marker-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 8px;
        border-radius: 8px;
        background: rgba(148, 163, 184, 0.12);
        font-size: 12px;
      }
      .marker-item .marker-actions {
        display: flex;
        gap: 6px;
      }
      .marker-item button {
        padding: 4px 8px;
        font-size: 12px;
      }
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(3, 7, 18, 0.65);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }
      .modal-backdrop.active {
        display: flex;
      }
      .modal {
        width: 360px;
        background: #0f172a;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .modal .modal-title {
        font-size: 14px;
        font-weight: 700;
      }
      .modal .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }
      .title {
        font-size: 18px;
        font-weight: 600;
        margin: 0;
      }
      .subtitle {
        color: var(--muted);
        margin: 0;
      }
      .status {
        font-size: 12px;
        color: var(--muted);
      }
      .field {
        display: flex;
        gap: 8px;
      }
      .field.inline-actions {
        align-items: center;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      input[type="text"] {
        flex: 1;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: #0b1020;
        color: var(--ink);
      }
      select {
        flex: 1;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: #0b1020;
        color: var(--ink);
      }
      button {
        padding: 10px 14px;
        border-radius: 10px;
        border: none;
        background: var(--accent);
        color: #0b1020;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary {
        background: rgba(148, 163, 184, 0.2);
        color: var(--ink);
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .results {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 50vh;
        overflow: auto;
      }
      .results li {
        padding: 8px 10px;
        border-radius: 10px;
        background: rgba(148, 163, 184, 0.12);
        cursor: pointer;
      }
      .results li.result-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .result-content {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .result-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .icon-btn {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(56, 189, 248, 0.2);
        color: var(--ink);
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .results li:hover {
        background: rgba(56, 189, 248, 0.2);
      }
      .results .meta {
        font-size: 11px;
        color: var(--muted);
      }
      .map-wrap {
        background: #0b1224;
        border-radius: 14px;
        padding: 8px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        position: relative;
        z-index: 1;
      }
      .map-stage {
        position: relative;
        height: calc(100vh - 140px);
        width: 100%;
        overflow: hidden;
      }
      .map-stage canvas,
      .map-stage svg#map {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        border-radius: 10px;
        overflow: hidden;
      }
      .map-stage canvas {
        background: #0a1020;
        pointer-events: none;
      }
      .map-stage svg#map {
        background: transparent;
        cursor: grab;
      }
      .map-stage svg#map.dragging {
        cursor: grabbing;
      }
      .map-stage svg#map.boxing {
        cursor: crosshair;
      }
      .map-toolbar {
        position: absolute;
        right: 16px;
        top: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 2;
      }
      .map-zoom-indicator {
        position: absolute;
        z-index: 2;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        color: var(--ink);
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid rgba(148, 163, 184, 0.35);
        letter-spacing: 0.4px;
        right: 12px;
        bottom: 12px;
      }
      .crop-frame {
        position: absolute;
        z-index: 2;
        border: 2px solid rgba(56, 189, 248, 0.9);
        box-shadow: 0 0 0 2000px rgba(15, 23, 42, 0.55);
        pointer-events: none;
      }
      .crop-frame.interactive {
        pointer-events: auto;
        cursor: move;
      }
      .crop-handle {
        position: absolute;
        width: 8px;
        height: 8px;
        background: #38bdf8;
        border: 1px solid rgba(15, 23, 42, 0.8);
        border-radius: 0;
        box-sizing: border-box;
      }
      .crop-handle::before {
        content: "";
        position: absolute;
        inset: -6px;
        background: transparent;
      }
      .crop-handle.nw {
        left: -4px;
        top: -4px;
        cursor: nwse-resize !important;
      }
      .crop-handle.ne {
        right: -4px;
        top: -4px;
        cursor: nesw-resize !important;
      }
      .crop-handle.sw {
        left: -4px;
        bottom: -4px;
        cursor: nesw-resize !important;
      }
      .crop-handle.se {
        right: -4px;
        bottom: -4px;
        cursor: nwse-resize !important;
      }
      .crop-handle.n {
        left: 50%;
        top: -4px;
        transform: translateX(-50%);
        cursor: ns-resize !important;
      }
      .crop-handle.s {
        left: 50%;
        bottom: -4px;
        transform: translateX(-50%);
        cursor: ns-resize !important;
      }
      .crop-handle.w {
        left: -4px;
        top: 50%;
        transform: translateY(-50%);
        cursor: ew-resize !important;
      }
      .crop-handle.e {
        right: -4px;
        top: 50%;
        transform: translateY(-50%);
        cursor: ew-resize !important;
      }
      .crop-frame.fixed .crop-handle.n,
      .crop-frame.fixed .crop-handle.s,
      .crop-frame.fixed .crop-handle.w,
      .crop-frame.fixed .crop-handle.e {
        display: block;
      }
      .map-wrap.step-range .map-toolbar,
      .map-wrap.step-locked .map-toolbar {
        display: none;
      }
      .crop-overlay {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }
      .crop-overlay.hidden {
        display: none;
      }
      .crop-mask {
        position: absolute;
        background: #05070f;
      }
      .map-footer {
        margin-top: 16px;
        display: flex;
        justify-content: flex-end;
        gap: 12px;
      }
      .map-footer button {
        padding: 12px 22px;
        font-size: 14px;
      }
      .crop-frame.hidden {
        display: none;
      }
      .map-toolbar button {
        background: rgba(15, 23, 42, 0.85);
        color: var(--ink);
        border: 1px solid rgba(148, 163, 184, 0.35);
        padding: 8px 10px;
      }
      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .map-stage {
          height: 60vh;
        }
        .map-toolbar {
          right: 12px;
          bottom: 12px;
          top: auto;
        }
        .map-zoom-indicator {
          right: 12px;
          bottom: 60px;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="panel">
        <div>
          <h1 class="title">地圖示意圖</h1>
          <p class="subtitle">地圖示意製作工具</p>
        </div>
        <p class="status" id="status">載入中…</p>
        <div class="step-header">
          <div class="step-progress" id="stepProgress">步驟 0 / 3</div>
          <div class="step-title" id="stepTitle">大致定位</div>
          <div class="step-subtitle" id="stepSubtitle"></div>
        </div>
        <div class="step-panel active" data-step-panel="0">
          <div class="hint">
            請先大致定位，確定要包含的區域，可透過地名搜尋幫助判斷。
          </div>
          <div class="field inline-actions">
            <button id="loadBtn0" class="secondary">載入專案</button>
          </div>
          <div class="field">
            <input
              id="search0"
              type="text"
              placeholder="輸入地名（例如：台北 / Taipei）"
            />
            <button id="searchBtn0">地名搜尋</button>
          </div>
          <div class="field">
            <input
              id="coord0"
              type="text"
              placeholder="輸入經緯度（例如：25.034, 121.564）"
            />
            <button id="coordBtn0">座標搜尋</button>
          </div>
          <ul class="results" id="results0"></ul>
        </div>
        <div class="step-panel" data-step-panel="1">
          <div class="hint">框選比例：</div>
          <div class="option-row">
            <button class="secondary ratio-button" id="ratioOriginal">
              預設
            </button>
            <button class="secondary ratio-button" id="ratioFree">自由</button>
            <button class="secondary ratio-button" id="ratioSquare">1:1</button>
            <button class="secondary ratio-button" id="ratio34">3:4</button>
            <button class="secondary ratio-button" id="ratio43">4:3</button>
            <button class="secondary ratio-button" id="ratio169">16:9</button>
            <button class="secondary ratio-button" id="ratio916">9:16</button>
            <button class="secondary ratio-button" id="ratioA4">A4</button>
          </div>
          <div class="option-row">
            <button class="secondary ratio-button" id="ratioCustom">
              自訂
            </button>
            <input id="ratioInputA" class="ratio-input" type="number" min="1" />
            <span class="hint">:</span>
            <input id="ratioInputB" class="ratio-input" type="number" min="1" />
          </div>
          <div class="hint">下一步：選擇是否要地形與底圖樣式。</div>
        </div>
        <div class="step-panel" data-step-panel="2">
          <div class="hint">底圖視覺風格：</div>
          <div class="option-row">
            <button class="secondary ratio-button" id="styleOriginal">
              預設
            </button>
            <button class="secondary ratio-button" id="styleMinimal">
              極簡
            </button>
            <button class="secondary ratio-button" id="styleDefault">
              淺色
            </button>
            <button class="secondary ratio-button" id="styleDark">深色</button>
            <button class="secondary ratio-button" id="styleOutline">
              輪廓
            </button>
            <button class="secondary ratio-button" id="styleSoft">柔和</button>
          </div>
          <div class="hint">地形陰影：</div>
          <div class="option-row">
            <button class="secondary active" data-relief="off">關閉</button>
            <button class="secondary" data-relief="source-over">覆蓋</button>
            <button class="secondary" data-relief="multiply">加深</button>
            <button class="secondary" data-relief="screen">濾色</button>
            <button class="secondary" data-relief="overlay">疊加</button>
            <button class="secondary" data-relief="soft-light">柔光</button>
            <button class="secondary" data-relief="hard-light">強光</button>
          </div>
          <div class="hint">下一步：加入地名標示或文字。</div>
        </div>
        <div class="step-panel" data-step-panel="3">
          <div class="hint">標示工具（示範版）。</div>
          <div class="field">
            <input
              id="search3"
              type="text"
              placeholder="輸入地名（如：台北 / Taipei）"
            />
            <button id="searchBtn3">地名搜尋</button>
          </div>
          <div class="field">
            <input
              id="coord3"
              type="text"
              placeholder="輸入經緯度（例如：25.034, 121.564）"
            />
            <button id="coordBtn3">座標搜尋</button>
          </div>
          <ul class="results" id="results3"></ul>
          <div class="hint">標示設定：</div>
          <div class="option-row">
            <label class="ratio-label">點大小</label>
            <div
              class="slider"
              id="markerDotSize"
              data-min="2"
              data-max="16"
              data-step="1"
              data-marks="9"
              data-default-index="3"
            >
              <div class="slider-track">
                <div class="slider-fill"></div>
                <div class="slider-thumb" tabindex="0"></div>
              </div>
              <div class="slider-marks"></div>
            </div>
          </div>
          <div class="option-row">
            <label class="ratio-label">字大小</label>
            <div
              class="slider"
              id="markerTextSize"
              data-min="4"
              data-max="12"
              data-step="1"
              data-marks="9"
              data-default-index="3"
            >
              <div class="slider-track">
                <div class="slider-fill"></div>
                <div class="slider-thumb" tabindex="0"></div>
              </div>
              <div class="slider-marks"></div>
            </div>
          </div>
          <div class="option-row">
            <label class="ratio-label">字體</label>
            <select id="markerFont">
              <option value="IBM Plex Sans, sans-serif">IBM Plex Sans</option>
              <option value="Noto Sans TC, sans-serif">Noto Sans TC</option>
              <option value="Microsoft JhengHei, sans-serif">Microsoft JhengHei</option>
              <option value="PingFang TC, sans-serif">PingFang TC</option>
              <option value="serif">Serif</option>
            </select>
          </div>
          <div class="option-row">
            <label class="ratio-label">點顏色</label>
            <input id="markerDotColor" type="color" value="#f97316" />
            <div class="color-palette" id="dotPalette">
              <button
                class="color-swatch"
                data-color="#ff7a59"
                data-color-target="dot"
                style="background: #ff7a59"
              ></button>
              <button
                class="color-swatch"
                data-color="#fde68a"
                data-color-target="dot"
                style="background: #fde68a"
              ></button>
              <button
                class="color-swatch"
                data-color="#f59e0b"
                data-color-target="dot"
                style="background: #f59e0b"
              ></button>
              <button
                class="color-swatch"
                data-color="#22c55e"
                data-color-target="dot"
                style="background: #22c55e"
              ></button>
              <button
                class="color-swatch"
                data-color="#38bdf8"
                data-color-target="dot"
                style="background: #38bdf8"
              ></button>
              <button
                class="color-swatch"
                data-color="#a78bfa"
                data-color-target="dot"
                style="background: #a78bfa"
              ></button>
              <button
                class="color-swatch"
                data-color="#f43f5e"
                data-color-target="dot"
                style="background: #f43f5e"
              ></button>
              <button
                class="color-swatch"
                data-color="#f97316"
                data-color-target="dot"
                style="background: #f97316"
              ></button>
            </div>
          </div>
          <div class="option-row">
            <label class="ratio-label">文字顏色</label>
            <input id="markerTextColor" type="color" value="#fde68a" />
            <div class="color-palette" id="textPalette">
              <button
                class="color-swatch"
                data-color="#ff7a59"
                data-color-target="text"
                style="background: #ff7a59"
              ></button>
              <button
                class="color-swatch"
                data-color="#fde68a"
                data-color-target="text"
                style="background: #fde68a"
              ></button>
              <button
                class="color-swatch"
                data-color="#f59e0b"
                data-color-target="text"
                style="background: #f59e0b"
              ></button>
              <button
                class="color-swatch"
                data-color="#22c55e"
                data-color-target="text"
                style="background: #22c55e"
              ></button>
              <button
                class="color-swatch"
                data-color="#38bdf8"
                data-color-target="text"
                style="background: #38bdf8"
              ></button>
              <button
                class="color-swatch"
                data-color="#a78bfa"
                data-color-target="text"
                style="background: #a78bfa"
              ></button>
              <button
                class="color-swatch"
                data-color="#f43f5e"
                data-color-target="text"
                style="background: #f43f5e"
              ></button>
              <button
                class="color-swatch"
                data-color="#f97316"
                data-color-target="text"
                style="background: #f97316"
              ></button>
            </div>
          </div>
          <div class="section-title">標示清單</div>
          <div class="marker-list" id="markerList"></div>
          <button id="clearMarkers" class="secondary">清除全部</button>
        </div>
      </div>
      <div class="map-wrap">
        <div class="map-toolbar">
          <button id="toolZoomIn">放大</button>
          <button id="toolZoomOut">縮小</button>
          <button id="toolReset">重設</button>
        </div>
        <div class="map-stage">
          <canvas id="basemap" width="1200" height="800"></canvas>
          <svg
            id="map"
            viewBox="0 0 1200 800"
            preserveAspectRatio="xMidYMid meet"
          ></svg>
          <div class="crop-overlay hidden" id="cropOverlay">
            <div class="crop-mask" id="cropMaskTop"></div>
            <div class="crop-mask" id="cropMaskLeft"></div>
            <div class="crop-mask" id="cropMaskRight"></div>
            <div class="crop-mask" id="cropMaskBottom"></div>
          </div>
          <div class="crop-frame hidden" id="cropFrame">
            <div class="crop-handle nw" data-handle="nw"></div>
            <div class="crop-handle ne" data-handle="ne"></div>
            <div class="crop-handle sw" data-handle="sw"></div>
            <div class="crop-handle se" data-handle="se"></div>
            <div class="crop-handle n" data-handle="n"></div>
            <div class="crop-handle s" data-handle="s"></div>
            <div class="crop-handle w" data-handle="w"></div>
            <div class="crop-handle e" data-handle="e"></div>
          </div>
          <div class="map-zoom-indicator" id="zoomIndicator">100%</div>
        </div>
        <div class="map-footer">
          <button id="prevStep" class="secondary">返回</button>
          <button id="nextStep">下一步</button>
        </div>
      </div>
    </div>
    <div class="modal-backdrop" id="coordEditModal">
      <div class="modal">
        <div class="modal-title">編輯座標標示</div>
        <input id="coordLabelInput" type="text" placeholder="輸入文字標示名稱（可留空）" />
        <div class="option-row">
          <label><input type="radio" name="coordLabelMode" value="name" /> 顯示文字</label>
          <label><input type="radio" name="coordLabelMode" value="coords" /> 顯示經緯度</label>
        </div>
        <div class="modal-actions">
          <button id="coordEditCancel" class="secondary">取消</button>
          <button id="coordEditSave">儲存</button>
        </div>
      </div>
    </div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
